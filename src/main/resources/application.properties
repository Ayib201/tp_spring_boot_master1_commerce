spring.application.name=commerce-en-ligne

# Datasource MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:commerce}?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:user123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:commerce}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.flyway.user=${DB_USERNAME:user}
spring.flyway.password=${DB_PASSWORD:user123}

# Management / Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Logging
logging.level.org.springframework.web=DEBUG
logging.file.name=logs/logs.log

# Info
info.application.name=commerce-en-ligne
info.application.version=@project.version@